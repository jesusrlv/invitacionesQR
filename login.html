<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Login | PEJ2025 - Sistema de Asistentes</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <!-- SweetAlert2 -->
  <script src="//cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- jQuery -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f7fc 0%, #eef2f8 100%);
      min-height: 100vh;
      color: #1e2f3e;
      display: flex;
      flex-direction: column;
    }

    /* ========== BARRA DE MENÚ ESTILO NAVCORE ========== */
    .navbar-central {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      border-bottom: 1px solid rgba(224, 232, 240, 0.8);
      padding: 0.7rem 0;
      position: sticky;
      top: 0;
      z-index: 1000;
      width: 100%;
    }

    .navbar-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: relative;
    }

    .nav-links-left {
      display: flex;
      gap: 1.8rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav-links-right {
      display: flex;
      gap: 1.8rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav-link-custom {
      text-decoration: none;
      font-weight: 500;
      color: #2c4b66;
      transition: all 0.2s;
      font-size: 0.95rem;
      letter-spacing: -0.2px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .nav-link-custom i {
      font-size: 1rem;
      opacity: 0.8;
    }

    .nav-link-custom:hover {
      color: #1d7e9c;
      transform: translateY(-2px);
    }

    /* LOGO CENTRAL */
    .logo-central {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .logo-circle {
      background: white;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 28px;
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.05);
      transition: 0.25s;
      border: 1px solid rgba(44,125,160,0.15);
    }

    .logo-circle i {
      font-size: 24px;
      color: #2c7da0;
    }

    .logo-text {
      font-weight: 700;
      font-size: 0.9rem;
      margin-top: 4px;
      letter-spacing: -0.2px;
      color: #1f5068;
      line-height: 1.2;
    }

    .logo-central:hover .logo-circle {
      transform: scale(1.02);
      box-shadow: 0 8px 18px rgba(44,125,160,0.12);
    }

    .btn-soft-outline {
      border: 1px solid #cad2db;
      background: white;
      border-radius: 40px;
      padding: 0.4rem 1.2rem;
      font-size: 0.85rem;
      font-weight: 500;
      transition: 0.2s;
      color: #2c4b66;
      white-space: nowrap;
    }

    .btn-soft-outline:hover {
      background: #2c7da0;
      border-color: #2c7da0;
      color: white;
    }

    /* SECCIÓN PRINCIPAL */
    .main-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      width: 100%;
      min-height: calc(100vh - 200px);
    }

    .centered-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    /* CARD LOGIN */
    .card-login {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(4px);
      border-radius: 48px;
      border: none;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.12);
      padding: 2.5rem;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header img {
      max-width: 180px;
      width: 60%;
      margin-bottom: 1rem;
    }

    .login-header h3 {
      font-weight: 700;
      color: #1e3a4d;
      font-size: 1.5rem;
    }

    .login-header p {
      color: #64748b;
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }

    /* FORMULARIO ESTILOS */
    .form-label-custom {
      font-weight: 600;
      font-size: 0.85rem;
      color: #2c4b66;
      margin-bottom: 0.25rem;
      display: block;
      text-align: left;
    }

    .input-group-modern {
      border-radius: 60px;
      overflow: hidden;
      border: 1.5px solid #e2e8f0;
      background: white;
      transition: all 0.2s;
      margin-bottom: 1rem;
    }

    .input-group-modern:focus-within {
      border-color: #2c7da0;
      box-shadow: 0 0 0 3px rgba(44,125,160,0.1);
    }

    .input-group-modern .input-group-text {
      background: transparent;
      border: none;
      color: #2c7da0;
      padding-left: 1.2rem;
    }

    .input-group-modern .form-control {
      border: none;
      padding: 0.8rem 0.8rem 0.8rem 0;
      background: transparent;
      font-size: 0.95rem;
    }

    .input-group-modern .form-control:focus {
      box-shadow: none;
      outline: none;
    }

    /* Botones */
    .btn-login {
      background: linear-gradient(135deg, #2c7da0 0%, #236b8a 100%);
      border: none;
      border-radius: 60px;
      padding: 0.85rem 1.8rem;
      font-weight: 600;
      transition: 0.2s;
      color: white;
      width: 100%;
      font-size: 1rem;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(44,125,160,0.3);
    }

    .btn-login:disabled {
      opacity: 0.6;
      transform: none;
    }

    /* Enlaces adicionales */
    .login-footer-links {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid #e2e8f0;
    }

    .login-footer-links a {
      color: #2c7da0;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: 0.2s;
    }

    .login-footer-links a:hover {
      color: #1a5a75;
      text-decoration: underline;
    }

    /* Mensajes de error */
    .error-message {
      color: #dc2626;
      font-size: 0.75rem;
      margin-top: -0.75rem;
      margin-bottom: 0.75rem;
      text-align: left;
      display: none;
    }

    /* FOOTER ELEGANTE */
    .footer-elegant {
      background: linear-gradient(135deg, #1a2a38 0%, #0f1e2a 100%);
      color: #cbd5e1;
      padding: 2rem 0 1.2rem;
      margin-top: auto;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .footer-brand {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, #a0c4d9 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: inline-block;
    }

    .footer-social-icons a {
      color: #94a3b8;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      margin-right: 6px;
    }

    .footer-social-icons a:hover {
      color: white;
      background: #2c7da0;
      transform: translateY(-3px);
    }

    .footer-bottom {
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 1.2rem;
      font-size: 0.75rem;
      color: #7e8c9e;
    }

    /* RESPONSIVE */
    @media (max-width: 992px) {
      .navbar-container {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
      }
      .nav-links-left, .nav-links-right {
        gap: 1.2rem;
      }
      .logo-central {
        order: 2;
        margin: 0 0.5rem;
      }
      .nav-links-left { order: 1; }
      .nav-links-right { order: 3; }
    }

    @media (max-width: 768px) {
      .card-login {
        padding: 1.8rem;
        margin: 0 1rem;
      }
      .login-header h3 {
        font-size: 1.3rem;
      }
    }

    @media (max-width: 580px) {
      .navbar-container {
        flex-direction: column;
        gap: 0.5rem;
      }
      .nav-links-left, .nav-links-right {
        justify-content: center;
        width: 100%;
      }
      .logo-central {
        order: 1;
      }
      .nav-links-left { order: 2; }
      .nav-links-right { order: 3; }
      .card-login {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- BARRA DE MENÚ ESTILO NAVCORE -->
  <nav class="navbar-central">
    <div class="container">
      <div class="navbar-container">
        <div class="nav-links-left">
          <a href="https://juventud.zacatecas.gob.mx" class="nav-link-custom" target="_blank"><i class="bi bi-houses-fill"></i> <span>Web oficial</span></a>
          <a href="#" class="nav-link-custom" id="linkAyudaLogin"><i class="bi bi-question-circle"></i> <span>Ayuda</span></a>
        </div>

        <a href="#" class="logo-central text-decoration-none" id="logoHome">
          <div class="logo-circle mx-auto">
            <i class="bi bi-award-fill"></i>
          </div>
          <div class="logo-text">PEJ2025</div>
        </a>

        <div class="nav-links-right">
          <a href="registro_asistentes.html" class="nav-link-custom" id="linkRegistro"><i class="bi bi-person-plus"></i> <span>Registro asistentes</span></a>
        </div>
      </div>
    </div>
  </nav>

  <!-- CONTENIDO PRINCIPAL - LOGIN -->
  <div class="main-content">
    <div class="centered-wrapper">
      <div class="card-login">
        
        <div class="login-header">
          <img src="img/logo_pej2025_01.png" alt="PEJ2025" onerror="this.src='https://placehold.co/200x80?text=PEJ2025'">
          <h3><i class="bi bi-shield-lock-fill me-2"></i>Iniciar sesión</h3>
          <p>Accede al sistema de gestión de asistentes</p>
        </div>

        <form id="loginForm">
          <div class="mb-2">
            <label class="form-label-custom"><i class="bi bi-person-circle"></i> Usuario / Email</label>
            <div class="input-group-modern d-flex">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="text" class="form-control" id="username" placeholder="usuario@ejemplo.com" autocomplete="username">
            </div>
            <div id="errorUsername" class="error-message"></div>
          </div>

          <div class="mb-2">
            <label class="form-label-custom"><i class="bi bi-key-fill"></i> Contraseña</label>
            <div class="input-group-modern d-flex">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="password" placeholder="••••••••" autocomplete="current-password">
              <button type="button" class="btn btn-link" id="togglePassword" style="background:transparent; border:none; color:#2c7da0; padding-right:1rem;">
                <i class="bi bi-eye-slash" id="toggleIcon"></i>
              </button>
            </div>
            <div id="errorPassword" class="error-message"></div>
          </div>

          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-login" id="loginBtn">
              <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
            </button>
          </div>

          <div class="login-footer-links">
            <a href="#" id="linkRecuperar"><i class="bi bi-key"></i> ¿Olvidaste tu contraseña?</a>
            <span class="mx-2 text-muted">|</span>
            <a href="#" id="linkRegistroFooter"><i class="bi bi-person-plus"></i> Registrar asistente</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- FOOTER ELEGANTE -->
  <footer class="footer-elegant">
    <div class="container">
      <div class="row g-4 align-items-center">
        <div class="col-md-4">
          <div class="footer-brand mb-2">
            <i class="bi bi-award-fill me-2"></i>PEJ2025
          </div>
          <p class="small" style="color:#94a3b8;">Premio Estatal de la Juventud · INJUVENTUD GODEZAC</p>
        </div>
        <div class="col-md-4 text-center">
          <div class="footer-social-icons">
            <a href="https://twitter.com/INJUVENTUD_zac" target="_blank"><i class="bi bi-twitter-x"></i></a>
            <a href="https://www.instagram.com/injuventud.zac" target="_blank"><i class="bi bi-instagram"></i></a>
            <a href="https://www.facebook.com/injuventud.zac" target="_blank"><i class="bi bi-facebook"></i></a>
          </div>
        </div>
        <div class="col-md-4 text-md-end">
          <p class="small mb-0">&copy; 2025 INJUVENTUD | GODEZAC</p>
        </div>
      </div>
      <div class="footer-bottom text-center mt-3">
        <p class="mb-0"><i class="bi bi-shield-check me-1"></i> Sistema de gestión de asistentes · Acceso seguro</p>
      </div>
    </div>
  </footer>

  <script>
    $(document).ready(function() {
      
      // Toggle mostrar/ocultar contraseña
      $('#togglePassword').on('click', function() {
        const passwordInput = $('#password');
        const icon = $('#toggleIcon');
        if (passwordInput.attr('type') === 'password') {
          passwordInput.attr('type', 'text');
          icon.removeClass('bi-eye-slash').addClass('bi-eye');
        } else {
          passwordInput.attr('type', 'password');
          icon.removeClass('bi-eye').addClass('bi-eye-slash');
        }
      });

      // Limpiar errores al escribir
      $('#username, #password').on('input', function() {
        $(this).closest('.input-group-modern').removeClass('border-danger');
        $(this).closest('.mb-2').find('.error-message').hide().empty();
      });

      // Manejo del formulario de login
      $('#loginForm').on('submit', function(e) {
        e.preventDefault();
        
        const username = $('#username').val().trim();
        const password = $('#password').val();
        let hasError = false;
        
        // Validación básica frontend
        if (username === '') {
          $('#errorUsername').text('El usuario o email es requerido').show();
          $('#username').closest('.input-group-modern').addClass('border-danger');
          hasError = true;
        } else if (!validateEmail(username) && username.length < 3) {
          $('#errorUsername').text('Ingresa un email válido o usuario (mínimo 3 caracteres)').show();
          $('#username').closest('.input-group-modern').addClass('border-danger');
          hasError = true;
        }
        
        if (password === '') {
          $('#errorPassword').text('La contraseña es requerida').show();
          $('#password').closest('.input-group-modern').addClass('border-danger');
          hasError = true;
        } else if (password.length < 4) {
          $('#errorPassword').text('La contraseña debe tener al menos 4 caracteres').show();
          $('#password').closest('.input-group-modern').addClass('border-danger');
          hasError = true;
        }
        
        if (hasError) return;
        
        // Deshabilitar botón mientras se procesa
        const $btn = $('#loginBtn');
        const originalText = $btn.html();
        $btn.prop('disabled', true).html('<i class="bi bi-hourglass-split me-2"></i> Validando...');
        
        // ==============================================
        // AQUÍ CONECTAS CON TU BACKEND
        // Ejemplo de AJAX - Descomenta y ajusta la URL
        // ==============================================
        /*
        $.ajax({
          type: "POST",
          url: "tu_archivo_login.php",  // Cambia por tu endpoint
          data: {
            username: username,
            password: password
          },
          dataType: "json",
          success: function(response) {
            if (response.success === true) {
              Swal.fire({
                icon: 'success',
                title: '¡Bienvenido!',
                text: 'Inicio de sesión exitoso',
                timer: 2000,
                showConfirmButton: false
              }).then(() => {
                // Redirigir según el rol o dashboard
                window.location.href = response.redirect || 'dashboard.html';
              });
            } else {
              Swal.fire({
                icon: 'error',
                title: 'Error de acceso',
                text: response.message || 'Usuario o contraseña incorrectos',
                confirmButtonColor: '#2c7da0'
              });
              $btn.prop('disabled', false).html(originalText);
            }
          },
          error: function(xhr, status, error) {
            Swal.fire({
              icon: 'error',
              title: 'Error de conexión',
              text: 'No se pudo conectar con el servidor. Intenta más tarde.',
              confirmButtonColor: '#2c7da0'
            });
            $btn.prop('disabled', false).html(originalText);
          }
        });
        */
        
        // ==============================================
        // SIMULACIÓN DE LOGIN (DEMO) - ELIMINA ESTA PARTE CUANDO CONECTES TU BACKEND
        // ==============================================
        // Simulación para demo - credenciales de prueba: admin@pej2025 / admin123
        setTimeout(() => {
          if ((username === 'admin@pej2025.com' || username === 'admin') && password === 'admin123') {
            Swal.fire({
              icon: 'success',
              title: '¡Bienvenido!',
              text: 'Inicio de sesión exitoso (DEMO)',
              timer: 2000,
              showConfirmButton: false
            }).then(() => {
              // Redirige al dashboard o panel de asistentes
              window.location.href = 'dashboard_asistentes.html';
            });
          } else {
            Swal.fire({
              icon: 'error',
              title: 'Error de acceso',
              text: 'Usuario o contraseña incorrectos.\nCredenciales demo: admin@pej2025.com / admin123',
              confirmButtonColor: '#2c7da0'
            });
            $btn.prop('disabled', false).html(originalText);
          }
        }, 800);
        // ==============================================
        // FIN DE SIMULACIÓN
        // ==============================================
      });
      
      // Validar email
      function validateEmail(email) {
        const re = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
        return re.test(email);
      }
      
      // Enlaces de navegación
      $('#linkAyudaLogin').on('click', function(e) {
        e.preventDefault();
        Swal.fire({
          title: '¿Necesitas ayuda?',
          html: 'Contacta al equipo de soporte:<br><strong>soporte@injuventud.zacatecas.gob.mx</strong><br>o llama al 492 123 4567',
          icon: 'info',
          confirmButtonColor: '#2c7da0'
        });
      });
      
      $('#linkRecuperar').on('click', function(e) {
        e.preventDefault();
        Swal.fire({
          title: 'Recuperar contraseña',
          html: '<p>Ingresa tu correo electrónico y te enviaremos instrucciones</p><input type="email" id="recoverEmail" class="swal2-input" placeholder="correo@ejemplo.com">',
          showCancelButton: true,
          confirmButtonText: 'Enviar',
          cancelButtonText: 'Cancelar',
          confirmButtonColor: '#2c7da0',
          preConfirm: () => {
            const email = Swal.getPopup().querySelector('#recoverEmail').value;
            if (!email || !validateEmail(email)) {
              Swal.showValidationMessage('Ingresa un correo válido');
              return false;
            }
            return email;
          }
        }).then((result) => {
          if (result.isConfirmed) {
            // Aquí conectarías con tu backend para enviar correo
            Swal.fire({
              icon: 'success',
              title: 'Solicitud enviada',
              text: `Se han enviado instrucciones a ${result.value}`,
              confirmButtonColor: '#2c7da0'
            });
          }
        });
      });
      
      // Redirección al registro de asistentes
      $('#linkRegistro, #linkRegistroFooter, #logoHome').on('click', function(e) {
        e.preventDefault();
        // Cambia a la página de registro de asistentes
        window.location.href = 'registro_asistentes.html';
      });
      
    });
  </script>
</body>
</html>
